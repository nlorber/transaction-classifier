upstream api {
    server api:8000;
}

# Rate limiting (must be in http context, outside server block)
limit_req_zone $binary_remote_addr zone=classify:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /classify {
        limit_req zone=classify burst=50 nodelay;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://api;
        access_log off;
    }

    location /ready {
        proxy_pass http://api;
        access_log off;
    }
}
