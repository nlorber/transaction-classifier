name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ hashFiles('uv.lock') }}
          restore-keys: uv-

      - name: Install dependencies
        run: uv sync --extra dev --extra all

      - name: Lint
        run: make lint

      - name: Type check
        run: make typecheck

      - name: Test with coverage
        run: uv run pytest --cov=transaction_classifier --cov-report=json --cov-fail-under=80 --tb=short

      - name: Extract coverage
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: coverage
        run: |
          COVERAGE=$(python -c "import json; print(round(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage-transaction-classifier.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          minColorRange: 50
          maxColorRange: 90
